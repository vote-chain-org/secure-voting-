# ── Database ──────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/votechain}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ───────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:votechainsecretkey1234567890123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────────────
# Comma-separated list; set CORS_ALLOWED_ORIGINS env var for LAN IPs
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://192.168.0.109:3000}

# ── ML Service ────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}

# ── Hyperledger Fabric ────────────────────────────────────────────────
fabric.peer.endpoint=${FABRIC_PEER_ENDPOINT:localhost:7051}
fabric.peer.overrideAuth=peer0.org1.example.com
fabric.mspId=Org1MSP
fabric.channelName=electionchannel
fabric.chaincodeName=voting

# Crypto material paths (relative to project root or absolute)
fabric.certPath=${FABRIC_CERT_PATH:network/crypto-config/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/signcerts}
fabric.keyPath=${FABRIC_KEY_PATH:network/crypto-config/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/keystore}
fabric.tlsCertPath=${FABRIC_TLS_CERT_PATH:network/crypto-config/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt}

# ── File Upload ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
